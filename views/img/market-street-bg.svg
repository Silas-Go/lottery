  <path d="M798 350 L814 408 L852 449 L866 505 L910 548 L929 608 L977 659 L1000 722 L1062 790 L1142 900" fill="none" stroke="#333936" stroke-width="12" opacity="0.68"/>

  <!-- 不等距短台阶与休息平台。 -->
  <g fill="none" stroke-linecap="round">
    <path d="M410 792 C590 803 852 792 1046 770" stroke="#303633" stroke-width="10" opacity="0.64"/>
    <path d="M434 751 C612 759 842 748 1007 728" stroke="#74786f" stroke-width="3" opacity="0.45"/>
    <path d="M478 686 C616 697 820 683 951 666" stroke="#303633" stroke-width="9" opacity="0.62"/>
    <path d="M498 652 C626 663 811 650 925 635" stroke="#777b72" stroke-width="3" opacity="0.38"/>
    <path d="M548 582 C646 590 793 583 893 567" stroke="#303633" stroke-width="8" opacity="0.6"/>
    <path d="M571 548 C661 556 789 546 864 536" stroke="#777b72" stroke-width="3" opacity="0.34"/>
    <path d="M624 477 C684 483 771 477 834 467" stroke="#303633" stroke-width="7" opacity="0.55"/>
    <path d="M647 428 C691 434 763 430 811 421" stroke="#2f3532" stroke-width="6" opacity="0.5"/>
  </g>

  <!-- 低细节青石接缝：前景大、远景少。 -->
  <g fill="none" stroke="#343a37" stroke-width="3" opacity="0.42">
    <path d="M382 850 L585 817 L607 900"/>
    <path d="M600 817 L806 807 L839 900"/>
    <path d="M816 806 L1031 789"/>
    <path d="M458 716 L619 704 L650 764"/>
    <path d="M644 700 L833 691 L862 744"/>
    <path d="M535 615 L667 608 L682 661"/>
    <path d="M695 605 L858 593"/>
  </g>
  <g fill="none" stroke="#7a7d74" stroke-width="2" opacity="0.26">
    <path d="M566 532 L672 524"/>
    <path d="M692 523 L841 511"/>
    <path d="M628 455 L714 451"/>
    <path d="M728 450 L812 443"/>
  </g>

  <!-- 左侧秒杀实验室背景轮廓。 -->
  <path d="M0 90 L408 49 L500 97 L485 900 L0 900 Z" fill="url(#leftFacade)"/>
  <path d="M0 85 L425 38 L512 82 L493 139 L0 173 Z" fill="#2d312f"/>
  <path d="M0 190 L475 150" stroke="#222725" stroke-width="12" opacity="0.75"/>
  <g opacity="0.22" stroke="#b7a77f" stroke-width="2">
    <path d="M92 188 L72 900"/><path d="M268 170 L247 900"/><path d="M433 151 L411 900"/>
    <path d="M0 336 L477 312"/><path d="M0 535 L474 520"/>
  </g>
  <rect x="54" y="163" width="365" height="112" rx="2" fill="#393934" stroke="#242927" stroke-width="9"/>
  <text x="236" y="205" fill="#cbb994" opacity="0.64" text-anchor="middle" font-family="serif" font-size="12" letter-spacing="4">LIMITED REQUEST OFFICE</text>
  <text x="236" y="240" fill="#ead4a8" text-anchor="middle" font-family="serif" font-size="29" letter-spacing="7">秒杀实验室</text>
  <text x="236" y="260" fill="#b9aa8c" opacity="0.6" text-anchor="middle" font-family="serif" font-size="10" letter-spacing="3">SECKILL LAB · PREVIEW</text>
  <rect x="75" y="371" width="300" height="430" fill="#302d28" stroke="#222624" stroke-width="14"/>
  <path d="M112 404 H338 M112 548 H338 M112 695 H338" stroke="#202422" stroke-width="7" opacity="0.72"/>
  <rect x="15" y="303" width="40" height="58" fill="#e2a952" opacity="0.55"/>
  <circle cx="35" cy="332" r="38" fill="url(#lampGlow)" opacity="0.45"/>

  <!-- 右侧材料情报店背景轮廓。 -->
  <path d="M948 105 L1040 59 L1440 96 L1440 900 L958 900 Z" fill="url(#rightFacade)"/>
  <path d="M936 88 L1042 38 L1440 75 L1440 160 L954 137 Z" fill="#30332f"/>
  <path d="M971 308 L1408 334 L1440 419 L951 392 Z" fill="#746957" stroke="#35352f" stroke-width="9"/>
  <g opacity="0.18" stroke="#d2bd94" stroke-width="2">
    <path d="M1050 144 L1070 900"/><path d="M1230 156 L1242 900"/><path d="M1383 165 L1388 900"/>
    <path d="M976 530 L1440 548"/>
  </g>
  <rect x="1003" y="153" width="380" height="118" rx="2" fill="#4b4439" stroke="#2a2d2a" stroke-width="9"/>
  <text x="1193" y="195" fill="#d3bf99" opacity="0.64" text-anchor="middle" font-family="serif" font-size="12" letter-spacing="4">MATERIAL INTELLIGENCE</text>
  <text x="1193" y="231" fill="#ead8b5" text-anchor="middle" font-family="serif" font-size="29" letter-spacing="7">材料情报店</text>
  <text x="1193" y="253" fill="#baa98b" opacity="0.6" text-anchor="middle" font-family="serif" font-size="10" letter-spacing="3">SILAS · MATERIAL ARCHIVES</text>
  <rect x="1041" y="430" width="341" height="289" fill="#413d34" stroke="#2c2d29" stroke-width="13"/>
  <g fill="#5a4938" stroke="#2c2c27" stroke-width="4">
    <rect x="1195" y="460" width="70" height="43"/><rect x="1273" y="460" width="70" height="43"/>
    <rect x="1195" y="511" width="70" height="43"/><rect x="1273" y="511" width="70" height="43"/>
  </g>
  <path d="M1076 625 Q1135 592 1190 624 Q1246 591 1298 625 L1289 677 Q1238 649 1190 678 Q1138 650 1084 676 Z" fill="#c3b28d" stroke="#6a5a42" stroke-width="4"/>
  <path d="M1020 710 L1405 728" stroke="#292b27" stroke-width="18"/>
