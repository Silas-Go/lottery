<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" preserveAspectRatio="none" role="img" aria-labelledby="title description">
  <title id="title">暗潮街室外市场背景占位图</title>
  <desc id="description">夕阳下向右上方延伸的旧城区青石街道，左右分别是秒杀实验室和材料情报店。</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#b8ad93"/>
      <stop offset="0.48" stop-color="#8f8c7f"/>
      <stop offset="1" stop-color="#5a605c"/>
    </linearGradient>
    <linearGradient id="street" x1="0" y1="0" x2="0.8" y2="1">
      <stop offset="0" stop-color="#575d59"/>
      <stop offset="0.55" stop-color="#626762"/>
      <stop offset="1" stop-color="#4c5350"/>
    </linearGradient>
    <linearGradient id="leftFacade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#303330"/>
      <stop offset="1" stop-color="#494943"/>
    </linearGradient>
    <linearGradient id="rightFacade" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0" stop-color="#393a35"/>
      <stop offset="1" stop-color="#5b5549"/>
    </linearGradient>
    <radialGradient id="lampGlow">
      <stop offset="0" stop-color="#ffd68a" stop-opacity="0.84"/>
      <stop offset="1" stop-color="#d89b43" stop-opacity="0"/>
    </radialGradient>
    <filter id="farBlur" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>
    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="1440" height="900" fill="url(#sky)"/>
  <circle cx="1110" cy="110" r="62" fill="#f4cc83" opacity="0.42" filter="url(#softGlow)"/>
  <circle cx="1110" cy="110" r="34" fill="#efd08f" opacity="0.48"/>
  <path d="M0 290 C280 245 460 285 670 253 C880 221 1095 247 1440 184 L1440 390 L0 390 Z" fill="#d1c7ae" opacity="0.08"/>

  <!-- 远景轮廓故意留出偏右的街道出口，不设置中央塔楼。 -->
  <g filter="url(#farBlur)" opacity="0.58">
    <path d="M0 188 L168 154 L287 176 L287 407 L0 407 Z" fill="#555a56"/>
    <path d="M105 154 L184 105 L260 176" fill="#4d524f"/>
    <path d="M265 244 L432 214 L516 237 L516 419 L265 419 Z" fill="#61645e"/>
    <path d="M314 214 L395 172 L478 235" fill="#515652"/>
    <path d="M958 225 L1118 185 L1217 209 L1217 420 L958 420 Z" fill="#565b57"/>
    <path d="M994 184 L1075 139 L1174 207" fill="#4d524f"/>
    <path d="M1191 174 L1340 134 L1440 163 L1440 414 L1191 414 Z" fill="#4f5451"/>
    <path d="M1250 134 L1320 91 L1401 156" fill="#474c49"/>
    <path d="M470 300 L590 277 L648 293 L648 424 L470 424 Z" fill="#686a63"/>
    <path d="M849 290 L941 272 L986 288 L986 423 L849 423 Z" fill="#62665f"/>
    <g fill="#303633" opacity="0.46">
      <rect x="42" y="241" width="17" height="31"/>
      <rect x="92" y="228" width="17" height="31"/>
      <rect x="346" y="283" width="14" height="24"/>
      <rect x="406" y="272" width="14" height="24"/>
      <rect x="1045" y="257" width="15" height="27"/>
      <rect x="1273" y="222" width="17" height="29"/>
    </g>
  </g>

  <path d="M0 250 C370 222 530 278 675 252" fill="none" stroke="#303431" stroke-width="2" opacity="0.48"/>
  <path d="M1440 230 C1190 214 1015 263 815 246" fill="none" stroke="#303431" stroke-width="2" opacity="0.45"/>
  <g transform="translate(555 205) rotate(-4)">
    <path d="M64 0 V45" stroke="#393d3a" stroke-width="2"/>
    <rect y="42" width="130" height="58" rx="2" fill="#55534b" stroke="#3a3d39" stroke-width="5"/>
    <text x="65" y="77" fill="#d8cab0" opacity="0.73" text-anchor="middle" font-family="serif" font-size="16" letter-spacing="6">旧市街</text>
  </g>

  <!-- 连续街道轮廓是一张背景图的一部分，边界随旧建筑转角轻微弯折。 -->
  <path d="M325 900 L386 814 L432 744 L474 697 L493 646 L535 596 L552 544 L600 500 L620 448 L663 408 L680 352 L798 350 L814 408 L852 449 L866 505 L910 548 L929 608 L977 659 L1000 722 L1062 790 L1142 900 Z" fill="url(#street)"/>
