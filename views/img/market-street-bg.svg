    <path d="M0 0 V137" stroke="#292e2c" stroke-width="7"/>
    <path d="M0 3 H34" stroke="#292e2c" stroke-width="6"/>
    <rect x="23" y="2" width="21" height="29" fill="#d89d45" stroke="#292e2c" stroke-width="5"/>
    <circle cx="34" cy="17" r="28" fill="url(#lampGlow)" opacity="0.45"/>
  </g>
  <g transform="translate(817 484) rotate(-5)" stroke="#343936" stroke-width="5">
    <path d="M0 0 H116"/>
    <path d="M4 -4 V43 M57 -4 V43 M112 -4 V43"/>
  </g>

  <rect y="0" width="1440" height="900" fill="none" stroke="#292e2c" stroke-opacity="0.2" stroke-width="18"/>
</svg>
