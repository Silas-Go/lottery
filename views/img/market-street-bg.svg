  <text x="1368" y="780" fill="#d5c29e" text-anchor="middle" font-family="serif" font-size="15" letter-spacing="3">档案检索</text>
  <text x="1368" y="805" fill="#b8a889" text-anchor="middle" font-family="serif" font-size="10">材料查询</text>
  <rect x="1390" y="366" width="32" height="49" fill="#e0a34e" opacity="0.5"/>
  <circle cx="1406" cy="391" r="35" fill="url(#lampGlow)" opacity="0.38"/>

  <!-- 建筑转角、旧路灯和栏杆都属于静态背景，不再由页面布局代码生成。 -->
  <path d="M295 775 L434 742 L476 783 L421 838 L283 852 Z" fill="#3b403d"/>
  <path d="M973 699 L1090 670 L1160 704 L1111 756 L989 765 Z" fill="#3e423e"/>
  <path d="M430 617 L537 592 L570 620 L532 653 L423 656 Z" fill="#424743"/>
  <path d="M886 544 L973 524 L1001 551 L968 579 L888 582 Z" fill="#434740"/>
