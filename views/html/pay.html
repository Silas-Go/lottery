<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>支付确认</title>
    <link rel="icon" type="image/png" href="/favicon.ico?v=2" />
    <link rel="stylesheet" href="/css/lottery.css" />
    <script src="/js/my.js"></script>
</head>

<body class="pay-page">
    <main class="pay-card" aria-labelledby="pay-title">
        <p class="eyebrow">Unified Order Lifecycle</p>
        <h1 id="pay-title">正在确认订单状态</h1>
        <p id="state-description" class="subtitle">两个库存模式共用 stock_acquired → pending_payment → paid/cancelled 生命周期。</p>

        <section class="pay-gift" aria-label="中奖奖品">
            <div class="pay-field">
                <span>奖品</span>
                <strong id="gift-name">加载中</strong>
            </div>
            <div class="pay-field">
                <span>待支付金额</span>
                <strong><span id="gift-price">0</span> 元</strong>
            </div>
        </section>

        <div class="architecture-flow" aria-label="当前订单链路">
            <div id="stock-node" class="flow-node is-active">库存已获取</div>
            <div class="flow-arrow">-></div>
            <div id="pending-node" class="flow-node">等待支付</div>
            <div class="flow-arrow">-></div>
            <div id="terminal-node" class="flow-node">支付 / 取消</div>
        </div>

        <div class="pay-actions">
            <button id="give-up" class="pay-action secondary" type="button">放弃本次机会</button>
            <button id="pay-now" class="pay-action primary" type="button">立即支付</button>
        </div>
        <p id="msg" class="pay-message" role="status" aria-live="polite"></p>
    </main>

    <script>
        function clearOrderCookie() {
            deleteCookie("uid");
            deleteCookie("gid");
            deleteCookie("name");
            deleteCookie("price");
            deleteCookie("order_status");
            deleteCookie("inventory_mode");
        }

        function currentOrder() {
            return {
                uid: getCookie("uid"),
                gid: getCookie("gid"),
                name: getCookie("name"),
                price: getCookie("price"),
                status: getCookie("order_status"),
                mode: getCookie("inventory_mode")
            };
        }

        function showMessage(text) {
            document.getElementById("msg").textContent = text;
        }

        async function postOrderAction(url) {
            var order = currentOrder();
            if (!order.uid || !order.gid) {
                clearOrderCookie();
                window.location.replace("/");
                return;
            }

            var body = new URLSearchParams();
            body.set("uid", order.uid);
            body.set("gid", order.gid);

            var response = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded;charset=UTF-8" },
                body: body
            });
            if (!response.ok) {
                var raw = await response.text();
                try {
                    var parsed = JSON.parse(raw);
                    throw new Error(parsed.message || raw);
                } catch (error) {
                    if (error instanceof SyntaxError) {
                        throw new Error(raw);
                    }
                    throw error;
                }
            }
        }

        function renderOrderState(status, mode) {
            var payButton = document.getElementById("pay-now");
            var giveUpButton = document.getElementById("give-up");
            var title = document.getElementById("pay-title");
            var description = document.getElementById("state-description");
            document.getElementById("stock-node").classList.add("is-active");
            document.getElementById("pending-node").classList.toggle("is-active", status !== "stock_acquired");
            document.getElementById("terminal-node").classList.toggle("is-active", status === "paid" || status === "cancelled");

            if (status === "stock_acquired") {
                title.textContent = "库存已获取，订单正在异步创建";
                description.textContent = "Redis 已完成准入，RocketMQ 正在削平写入峰值；正式账本建立后才能支付。";
                payButton.disabled = true;
                giveUpButton.disabled = false;
                return;
            }
            if (status === "pending_payment") {
                title.textContent = "订单待支付";
                description.textContent = mode === "mysql"
                    ? "MySQL 已原子完成库存扣减和待支付订单创建。"
                    : "异步订单已经写入 MySQL 最终账本，请在有效期内支付。";
                payButton.disabled = false;
                giveUpButton.disabled = false;
                return;
            }
            payButton.disabled = true;
            giveUpButton.disabled = true;
            title.textContent = status === "paid" ? "订单已支付" : "订单已取消";
            description.textContent = status === "paid" ? "库存已经永久消耗。" : "库存已经且只会回补一次。";
        }

        async function refreshOrderState(order) {
            var response = await fetch("/api/order/status?uid=" + encodeURIComponent(order.uid) + "&gid=" + encodeURIComponent(order.gid));
            if (!response.ok) {
                return order.status;
            }
            var state = await response.json();
            renderOrderState(state.status, state.inventoryMode);
            return state.status;
        }

        document.addEventListener("DOMContentLoaded", function () {
            var order = currentOrder();
            document.getElementById("gift-name").textContent = order.name || "未知奖品";
            document.getElementById("gift-price").textContent = order.price || "0";
            renderOrderState(order.status || "stock_acquired", order.mode || "redis");
            var poll = window.setInterval(async function () {
                var status = await refreshOrderState(order);
                if (status === "paid" || status === "cancelled") {
                    window.clearInterval(poll);
                }
            }, 1000);
            refreshOrderState(order);

            document.getElementById("give-up").addEventListener("click", async function () {
                try {
                    await postOrderAction("/giveup");
                    clearOrderCookie();
                    window.location.replace("/");
                } catch (error) {
                    showMessage(error.message);
                }
            });

            document.getElementById("pay-now").addEventListener("click", async function () {
                try {
                    await postOrderAction("/pay");
                    clearOrderCookie();
                    alert("支付成功，订单已进入 paid 状态。");
                    window.location.replace("/");
                } catch (error) {
                    showMessage(error.message);
                }
            });
        });
    </script>
</body>

</html>
