<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>支付确认</title>
    <link rel="icon" type="image/png" href="/favicon.ico?v=2" />
    <link rel="stylesheet" href="/css/lottery.css" />
    <script src="/js/my.js"></script>
</head>

<body class="pay-page">
    <main class="pay-card" aria-labelledby="pay-title">
        <p class="eyebrow">Temporary Order</p>
        <h1 id="pay-title">抢购资格已锁定</h1>
        <p class="subtitle">系统已经完成 Redis 预扣库存，并发送 RocketMQ 延迟取消消息。请在资格有效期内完成支付。</p>

        <section class="pay-gift" aria-label="中奖奖品">
            <div class="pay-field">
                <span>奖品</span>
                <strong id="gift-name">加载中</strong>
            </div>
            <div class="pay-field">
                <span>待支付金额</span>
                <strong><span id="gift-price">0</span> 元</strong>
            </div>
        </section>

        <div class="architecture-flow" aria-label="当前订单链路">
            <div class="flow-node is-active">Redis 临时订单</div>
            <div class="flow-arrow">-></div>
            <div class="flow-node is-active">RocketMQ 延迟取消</div>
            <div class="flow-arrow">-></div>
            <div class="flow-node">MySQL 正式订单</div>
        </div>

        <div class="pay-actions">
            <button id="give-up" class="pay-action secondary" type="button">放弃本次机会</button>
            <button id="pay-now" class="pay-action primary" type="button">立即支付</button>
        </div>
        <p id="msg" class="pay-message" role="status" aria-live="polite"></p>
    </main>

    <script>
        function clearOrderCookie() {
            deleteCookie("uid");
            deleteCookie("gid");
            deleteCookie("name");
            deleteCookie("price");
        }

        function currentOrder() {
            return {
                uid: getCookie("uid"),
                gid: getCookie("gid"),
                name: getCookie("name"),
                price: getCookie("price")
            };
        }

        function showMessage(text) {
            document.getElementById("msg").textContent = text;
        }

        async function postOrderAction(url) {
            var order = currentOrder();
            if (!order.uid || !order.gid) {
                clearOrderCookie();
                window.location.replace("/");
                return;
            }

            var body = new URLSearchParams();
            body.set("uid", order.uid);
            body.set("gid", order.gid);

            var response = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded;charset=UTF-8" },
                body: body
            });
            if (!response.ok) {
                throw new Error(await response.text());
            }
        }

        document.addEventListener("DOMContentLoaded", function () {
            var order = currentOrder();
            document.getElementById("gift-name").textContent = order.name || "未知奖品";
            document.getElementById("gift-price").textContent = order.price || "0";

            document.getElementById("give-up").addEventListener("click", async function () {
                try {
                    await postOrderAction("/giveup");
                    clearOrderCookie();
                    window.location.replace("/");
                } catch (error) {
                    showMessage(error.message);
                }
            });

            document.getElementById("pay-now").addEventListener("click", async function () {
                try {
                    await postOrderAction("/pay");
                    clearOrderCookie();
                    alert("支付成功，正式订单已创建。");
                    window.location.replace("/");
                } catch (error) {
                    showMessage(error.message);
                    clearOrderCookie();
                }
            });
        });
    </script>
</body>

</html>
